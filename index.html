<html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffc0cb, #ffd6e0);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Glass Card */
.card {
  backdrop-filter: blur(15px);
  background: rgba(255, 255, 255, 0.2);
  border-radius: 20px;
  padding: 30px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 0 25px rgba(0,0,0,0.1);
}

/* Hide pages */
.page {
  display: none;
}

.active {
  display: block;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #ff4b6e;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

/* 🎉 Party animation */
.party {
  position: absolute;
  font-size: 30px;
  animation: float 2s infinite alternate;
}

.left { left: 10px; top: 20%; }
.right { right: 10px; top: 20%; }

@keyframes float {
  from { transform: translateY(0); }
  to { transform: translateY(-20px); }
}

</style>
</head>

<body>

<div class="card">

  <!-- Page 1 -->
  <div class="page active" id="page1">
    <h2>Let's know you 💖</h2>
    <input type="text" id="name" placeholder="Enter Name">
    <input type="number" id="age" placeholder="Enter Age">
    <br>
    <button onclick="nextPage(2)">Next ➡️</button>
  </div>

  <!-- Page 2 -->
  <div class="page" id="page2">
    <h2>🎁 You Have A Present 🎉</h2>
    <button onclick="nextPage(3)">Open 🎁</button>
  </div>

  <!-- Page 3 -->
  <div class="page" id="page3">
    <div class="party left">🎉</div>
    <div class="party right">🎉</div>

    <p id="message"></p>

    <button onclick="nextPage(4)">Next ➡️</button>
  </div>

  <!-- Page 4 -->
  <div class="page" id="page4">
    <h2>💖 You are the best 💖</h2>
  </div>

</div>

<script>
function nextPage(pageNumber) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page" + pageNumber).classList.add("active");

  if (pageNumber === 3) {
    let name = document.getElementById("name").value || "Bestie";

    document.getElementById("message").innerText =
    `Happy Birthday to my bestie ${name}! 🎉 You’re not just a friend, you’re my safe place, my biggest supporter, and the reason behind so many of my happiest memories. Life feels lighter and more fun with you by my side. No matter how crazy things get, I know we’ll always have each other. Thank you for being real, loyal, and absolutely amazing. I hope this year brings you endless happiness, success, and everything you’ve been wishing for. Stay the same beautiful soul you are. Love you always! 💖`;
  }
}
</script>

</body>
</html>
